name: RE4 Packed Mach-O Reverse Engineering

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  extract-and-unpack:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Advanced Binary Toolchains
      run: |
        sudo dpkg --add-architecture i386
        sudo apt-get update
        # Added radare2 for automated binary unpacking and pattern carving
        sudo apt-get install -y wine wine32 wine64 unrar p7zip-full zip binutils llvm clang radare2

    - name: Install IPSW Engine & Toolchains
      run: |
        echo "Installing blacktop/ipsw toolchain..."
        curl -sS https://webi.sh/ipsw | sh
        echo "$HOME/.local/bin" >> $GITHUB_PATH

    - name: Download IPA file
      run: |
        curl -L -o app.ipa "https://github.com/Doann7457/tai-ipa/releases/download/jp.co.capcom.RE4US-6462360082-863325402/jp.co.capcom.RE4US-1.0.2-6462360082-863325402.ipa"

    - name: Extract IPA
      run: |
        mkdir -p extracted_ipa
        unzip app.ipa -d extracted_ipa/

    - name: Download and Extract FluffyQuack REtool
      run: |
        curl -L -o REtool.rar "http://www.fluffyquack.com/tools/REtool.rar"
        mkdir -p Utils temp_extracted
        unrar x -o+ REtool.rar temp_extracted/
        FOUND_RETOOL=$(find temp_extracted/ -iname "retool.exe" -print -quit)
        if [ -n "$FOUND_RETOOL" ]; then
            mv "$FOUND_RETOOL" Utils/retool.exe
            rm -rf temp_extracted
        else
            echo "Failed to locate retool.exe"
            exit 1
        fi

    - name: Unpack Pak Assets via Wine
      run: |
        WORKSPACE_DIR=$(pwd)
        PAK_PATH=$(find "$WORKSPACE_DIR/extracted_ipa" -name "re_chunk_000.pak" -print -quit)
        RETOOL_PATH="$WORKSPACE_DIR/Utils/retool.exe"
        
        if [ -n "$PAK_PATH" ]; then
            mkdir -p "$WORKSPACE_DIR/Extracted_Output"
            cd "$WORKSPACE_DIR/Extracted_Output"
            wine "$RETOOL_PATH" -re4 -extract "$PAK_PATH" . || true
            cd "$WORKSPACE_DIR"
        else
            exit 1
        fi

    - name: Unpack, Decrypt-Check, and Decompile Mach-O Layout
      run: |
        BINARY_PATH=$(find extracted_ipa/ -path "*/Resident Evil 4.app/Resident Evil 4" -print -quit)
        
        if [ -n "$BINARY_PATH" ]; then
            mkdir -p Advanced_RE_Extraction
            
            echo "=== 1. Checking Apple DRM Encryption State ==="
            # This identifies if cryptid is 1 (Protected by FairPlay DRM) or 0 (Decrypted)
            ipsw macho info "$BINARY_PATH" | grep -E "crypt|encryption" > Advanced_RE_Extraction/drm_status.txt || true
            
            echo "=== 2. Carving Packed Code Patterns (Radare2) ==="
            # Uses radare2 to analyze references, entry points, and structural maps 
            # even if sections of the code are obfuscated or packed.
            r2 -q -c "aa; af; pdf" "$BINARY_PATH" > Advanced_RE_Extraction/r2_control_flow.txt || true
            
            echo "=== 3. Extracting Reconstructed Headers ==="
            # Attempts to extract runtime Objective-C frameworks/classes metadata layouts
            ipsw macho class-dump "$BINARY_PATH" > Advanced_RE_Extraction/reconstructed_engine_classes.h || true
            
            echo "=== 4. Advanced Disassembly with Demangled Symbols ==="
            llvm-objdump -d --macho --demangle --symbol-description "$BINARY_PATH" > Advanced_RE_Extraction/disassembled_assembly.asm || true
            
            zip -r re4_reversed_macho.zip Advanced_RE_Extraction/
        else
            echo "Binary not found"
            exit 1
        fi

    - name: Save Extracted Pak Assets Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Extracted-RE4-Assets
        path: Extracted_Output/
        retention-days: 3

    - name: Save Reverse Engineering Analysis Pack
      uses: actions/upload-artifact@v4
      with:
        name: RE4-MachO-Reverse-Engineering-Pack
        path: re4_reversed_macho.zip
        retention-days: 3
