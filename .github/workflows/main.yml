name: RE4 Decompiler to C-Code macOS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  decompile-binary:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Java & Ghidra (Decompiler Engine)
      run: |
        echo "Installing Dependencies via Homebrew..."
        brew install openjdk@17
        brew install --cask ghidra

    - name: Download RE4 IPA file
      run: |
        curl -L -o app.ipa "https://github.com/Doann7457/tai-ipa/releases/download/jp.co.capcom.RE4US-6462360082-863325402/jp.co.capcom.RE4US-1.0.2-6462360082-863325402.ipa"

    - name: Extract IPA
      run: |
        mkdir -p extracted_ipa
        unzip app.ipa -d extracted_ipa/

    - name: Run Ghidra Decompiler to Generate C-Code
      run: |
        echo "Locating RE4 primary binary executable..."
        BINARY_PATH=$(find extracted_ipa -type f -path "*/Resident Evil 4.app/Resident Evil 4" -print -quit)
        
        if [ -n "$BINARY_PATH" ]; then
            echo "Binary found at: $BINARY_PATH"
            mkdir -p RE4_Decompiled_Source
            
            # Ghidra Headless Analyzer রান করার পাথ সেটআপ
            GHIDRA_HEADLESS="/Applications/Ghidra.app/Contents/Resources/Ghidra/support/analyzeHeadless"
            
            echo "Starting Deep Decompilation into C-Style Pseudo-Code..."
            # Ghidra ব্যাকগ্রাউন্ডে প্রজেক্ট তৈরি করে বাইনারি ফাইলটিকে ডিকম্পাইল করে .c ফাইলে কনভার্ট করবে
            $GHIDRA_HEADLESS . RE4_TmpProj -import "$BINARY_PATH" -postScript Decompile.java RE4_Decompiled_Source/re4_decompiled_logic.c || true
            
            # যদি সম্পূর্ণ গেম বড় হওয়ার কারণে ডিকম্পাইল স্ক্রিপ্ট ফেইলও করে, আমরা যেন একটি স্ট্রাকচারাল রিডআউট পাই
            if [ ! -f "RE4_Decompiled_Source/re4_decompiled_logic.c" ]; then
                echo "Falling back to Function Symbols Mapping..."
                nm -gC "$BINARY_PATH" > RE4_Decompiled_Source/re4_readable_functions_list.txt || true
            fi
            
            # আগের এক্সট্রাক্ট করা টেক্সট পাথগুলোও এর সাথে যুক্ত করে দিচ্ছি
            strings "$BINARY_PATH" | grep -E "\.(cpp|hpp|c|h|swift|m|mm|py|lua|go|cs|txt)\b" | sort -u > RE4_Decompiled_Source/original_file_tree_references.txt || true
            
            # জিপ ফাইল তৈরি
            zip -r re4_c_source_code.zip RE4_Decompiled_Source/
            echo "Success: Decoupled code structures saved into re4_c_source_code.zip"
        else
            echo "CRITICAL ERROR: 'Resident Evil 4' binary file could not be found!"
            exit 1
        fi

    - name: Save Decompiled C Code Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RE4-Decompiled-C-Source
        path: re4_c_source_code.zip
        retention-days: 5
