name: RE4 Multi-Language Pseudo-Code Extractor

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  decompile-and-convert:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python & Java Environment
      uses: actions/setup-python@v5
      with:
        python-cache-dependency-path: 3.11
    
    - name: Install System Dependencies
      run: |
        brew install openjdk@17
        echo "JAVA_HOME=$(brew --prefix openjdk@17)" >> $GITHUB_ENV
        echo "$(brew --prefix openjdk@17)/bin" >> $GITHUB_PATH

    - name: Download and Setup Ghidra Engine
      run: |
        curl -L -o ghidra.zip "https://github.com/NationalSecurityAgency/ghidra/releases/download/Ghidra_11.1.2_build/ghidra_11.1.2_PUBLIC_20240709.zip"
        unzip -q ghidra.zip
        mv ghidra_11.1.2_PUBLIC ghidra_app
        chmod +x ghidra_app/support/analyzeHeadless

    - name: Download RE4 IPA file
      run: |
        curl -L -o app.ipa "https://github.com/Doann7457/tai-ipa/releases/download/jp.co.capcom.RE4US-6462360082-863325402/jp.co.capcom.RE4US-1.0.2-6462360082-863325402.ipa"

    - name: Extract IPA
      run: |
        mkdir -p extracted_ipa
        unzip -q app.ipa -d extracted_ipa/

    - name: Create Python Post-Processing Script
      run: |
        mkdir -p Scripts
        # একটি পাইথন স্ক্রিপ্ট তৈরি করা হচ্ছে যা আউটপুট ডাটাকে প্রসেস করে JSON এবং C++ স্ট্রাকচারে রূপান্তর করবে
        cat << 'EOF' > Scripts/generate_structures.py
        import json
        import re
        import os

        print("Starting Python analysis on extracted symbols...")
        output_dir = "RE4_Converted_Source"
        os.makedirs(output_dir, exist_ok=True)

        # ১. মেমোরি ম্যাপকে JSON ফরম্যাটে কনভার্ট করার লজিক
        memory_map = {
            "game": "Resident Evil 4 Mobile",
            "architecture": "ARM64/AArch64",
            "extracted_segments": []
        }

        # একটি ডামি স্ট্রাকচারাল JSON ডাটাবেস তৈরি (অ্যানালাইসিসের সুবিধার্থে)
        with open(f"{output_dir}/game_structure_map.json", "w") as f:
            json.dump(memory_map, f, indent=4)

        print("Python processing completed successfully.")
        EOF
        python3 Scripts/generate_structures.py

    - name: Run Deep Decompilation
      run: |
        echo "Locating RE4 primary binary executable..."
        BINARY_PATH=$(find extracted_ipa -type f -path "*/Resident Evil 4.app/Resident Evil 4" -print -quit)
        
        if [ -n "$BINARY_PATH" ]; then
            echo "Binary found at: $BINARY_PATH"
            mkdir -p RE4_Converted_Source
            
            GHIDRA_HEADLESS="./ghidra_app/support/analyzeHeadless"
            
            echo "Converting Assembly/Machine Code into Readable C/C++ Sequences..."
            # Ghidra দিয়ে মূল বাইনারির লজিক ডিকম্পাইল করে রিলিজ করা হচ্ছে
            $GHIDRA_HEADLESS . RE4_Proj -import "$BINARY_PATH" -postScript Decompile.java RE4_Converted_Source/re4_decompiled_logic.cpp || true
            
            # ব্যাকআপ হিসেবে গেমের রিডেবল সব ফাংশন এবং মেমোরি অফসেট এক্সট্রাক্ট করা হচ্ছে
            echo "Extracting Object Symbols..."
            nm -gC "$BINARY_PATH" > RE4_Converted_Source/re4_functions_symbols.c || true
            
            # সব ডেভেলপমেন্ট ফাইল ট্র্যাকের আসল সোর্স লিস্ট তৈরি
            strings "$BINARY_PATH" | grep -E "\.(cpp|hpp|c|h|swift|m|mm|py|lua|go|cs|txt)\b" | sort -u > RE4_Converted_Source/original_developer_file_tree.txt || true
            
            # সম্পূর্ণ ফোল্ডারটি জিপ করা
            zip -r re4_converted_code.zip RE4_Converted_Source/
            echo "Process finished."
        else
            echo "CRITICAL ERROR: 'Resident Evil 4' binary file could not be found!"
            exit 1
        fi

    - name: Save Multi-Language Source Code Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RE4-MultiLanguage-PseudoSource
        path: re4_converted_code.zip
        retention-days: 5
