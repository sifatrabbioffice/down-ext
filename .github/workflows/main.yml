name: RE4 Decompiler to C-Code macOS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  decompile-binary:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Java (Required for Ghidra)
      run: |
        echo "Installing OpenJDK 17 via Homebrew..."
        brew install openjdk@17
        # জাভার এনভায়রনমেন্ট পাথ রানারকে চিনিয়ে দেওয়া হচ্ছে
        echo "JAVA_HOME=$(brew --prefix openjdk@17)" >> $GITHUB_ENV
        echo "$(brew --prefix openjdk@17)/bin" >> $GITHUB_PATH

    - name: Download and Setup Ghidra (Direct Release)
      run: |
        echo "Downloading Ghidra from official GitHub releases..."
        # সরাসরি Ghidra v11.1.2 ডাউনলোড করা হচ্ছে (হোমব্রু এর ঝামেলা এড়াতে)
        curl -L -o ghidra.zip "https://github.com/NationalSecurityAgency/ghidra/releases/download/Ghidra_11.1.2_build/ghidra_11.1.2_PUBLIC_20240709.zip"
        
        echo "Extracting Ghidra..."
        unzip -q ghidra.zip
        # সহজে অ্যাক্সেস করার জন্য ফোল্ডার রিনেম করা হচ্ছে
        mv ghidra_11.1.2_PUBLIC ghidra_app
        chmod +x ghidra_app/support/analyzeHeadless

    - name: Download RE4 IPA file
      run: |
        curl -L -o app.ipa "https://github.com/Doann7457/tai-ipa/releases/download/jp.co.capcom.RE4US-6462360082-863325402/jp.co.capcom.RE4US-1.0.2-6462360082-863325402.ipa"

    - name: Extract IPA
      run: |
        mkdir -p extracted_ipa
        unzip -q app.ipa -d extracted_ipa/

    - name: Run Ghidra Decompiler to Generate C-Code
      run: |
        echo "Locating RE4 primary binary executable..."
        BINARY_PATH=$(find extracted_ipa -type f -path "*/Resident Evil 4.app/Resident Evil 4" -print -quit)
        
        if [ -n "$BINARY_PATH" ]; then
            echo "Binary found at: $BINARY_PATH"
            mkdir -p RE4_Decompiled_Source
            
            # সরাসরি ডাউনলোড করা হেডলেস অ্যানালাইজারের পাথ সেট করা হলো
            GHIDRA_HEADLESS="./ghidra_app/support/analyzeHeadless"
            
            echo "Starting Deep Decompilation into C-Style Pseudo-Code..."
            # Ghidra ব্যাকগ্রাউন্ড প্রজেক্ট খুলে বাইনারিটি অ্যানালাইসিস করবে
            $GHIDRA_HEADLESS . RE4_TmpProj -import "$BINARY_PATH" -postScript Decompile.java RE4_Decompiled_Source/re4_decompiled_logic.c || true
            
            # কোনো কারণে গেম সাইজ বেশি বড় হওয়ায় ফুল ডিকম্পাইল আটকে গেলে ফাংশন ম্যাপ ব্যাকআপ হিসেবে তৈরি হবে
            if [ ! -f "RE4_Decompiled_Source/re4_decompiled_logic.c" ]; then
                echo "Creating Fallback Function Symbols Mapping..."
                nm -gC "$BINARY_PATH" > RE4_Decompiled_Source/re4_readable_functions_list.txt || true
            fi
            
            # আপনার রিকোয়েস্ট করা কোড পাথ ট্র্যাকিং ফাইল
            strings "$BINARY_PATH" | grep -E "\.(cpp|hpp|c|h|swift|m|mm|py|lua|go|cs|txt)\b" | sort -u > RE4_Decompiled_Source/original_file_tree_references.txt || true
            
            # রেজাল্ট জিপ করা হচ্ছে
            zip -r re4_c_source_code.zip RE4_Decompiled_Source/
            echo "Success: Decoupled code structures saved into re4_c_source_code.zip"
        else
            echo "CRITICAL ERROR: 'Resident Evil 4' binary file could not be found!"
            exit 1
        fi

    - name: Save Decompiled C Code Artifact
      uses: actions/upload-artifact@v4
      with:
        name: RE4-Decompiled-C-Source
        path: re4_c_source_code.zip
        retention-days: 5
