name: RE4 Complete Binary Stripper macOS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deep-extract:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download IPA file
      run: |
        curl -L -o app.ipa "https://github.com/Doann7457/tai-ipa/releases/download/jp.co.capcom.RE4US-6462360082-863325402/jp.co.capcom.RE4US-1.0.2-6462360082-863325402.ipa"

    - name: Extract IPA
      run: |
        mkdir -p extracted_ipa
        unzip app.ipa -d extracted_ipa/

    - name: Deep Extract Binary Strings and System Maps
      run: |
        echo "Locating executable binary file..."
        BINARY_PATH=$(find extracted_ipa -type f -path "*/Resident Evil 4.app/Resident Evil 4" -print -quit)
        
        if [ -n "$BINARY_PATH" ]; then
            echo "Binary targeted successfully at: $BINARY_PATH"
            mkdir -p RE4_Full_Binary_Dump
            
            echo "--- DUMP 1: Running Absolute Master Dump (All Printable Text) ---"
            # Captures every single byte segment translated to alphanumeric text (minimum length 4)
            strings "$BINARY_PATH" > RE4_Full_Binary_Dump/01_master_all_printable_strings.txt || true
            
            echo "--- DUMP 2: Filtering All Multi-Language Source Code Paths ---"
            # Expanded regex for all software architectures (C, C++, C#, Python, Swift, Go, Assembler, Headers, Text layout maps)
            grep -E "\.(cpp|hpp|c|h|swift|m|mm|py|lua|go|cs|txt|java|asm|s|json|yaml|ini|cfg)\b" RE4_Full_Binary_Dump/01_master_all_printable_strings.txt | sort -u > RE4_Full_Binary_Dump/02_developer_source_code_paths.txt || true
            
            echo "--- DUMP 3: Filtering RE Engine Proprietary Formats & Engine Asset Paths ---"
            # Targets explicit CAPCOM RE Engine internal file types (.pak, user configurations, scene components, mesh models, fonts)
            grep -E "\.(pak|user|scn|pfb|msg|uvs|uvar|mdf2|efx|tex|dds|mesh|motlist|rcol|chain|motbank|gui|aimap)\b" RE4_Full_Binary_Dump/01_master_all_printable_strings.txt | sort -u > RE4_Full_Binary_Dump/03_re_engine_asset_file_paths.txt || true
            
            echo "--- DUMP 4: Extracting URI, API endpoints, Local System Directories ---"
            # Captures standard Windows backslash routes, Unix forward slash paths, and network endpoints embedded in code
            grep -E "(^|[a-zA-Z]:\\|/)([^/\\\0]+[/\\\\])+[^/\\\0]+|https?://[a-zA-Z0-9./_-]+" RE4_Full_Binary_Dump/01_master_all_printable_strings.txt | sort -u > RE4_Full_Binary_Dump/04_all_embedded_system_routes.txt || true
            
            echo "--- DUMP 5: Extracting System Variables & Functions Symbols ---"
            # Pulls variable chains, function identifiers, internal class configurations, and global objects
            grep -E "^[a-zA-Z_][a-zA-Z0-9_]{3,49}$" RE4_Full_Binary_Dump/01_master_all_printable_strings.txt | sort -u > RE4_Full_Binary_Dump/05_system_variables_and_symbols.txt || true

            # Compress output directory
            zip -r re4_complete_binary_analysis.zip RE4_Full_Binary_Dump/
            echo "Extraction phase completed successfully!"
        else
            echo "CRITICAL ERROR: Resident Evil 4 Executable cannot be found in the directory tree!"
            exit 1
        fi

    - name: Upload Binary Analysis Package
      uses: actions/upload-artifact@v4
      with:
        name: RE4-Complete-Binary-Analysis-Dump
        path: re4_complete_binary_analysis.zip
        retention-days: 5
