name: RE4 Pak Auto Extractor macOS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  extract-and-unpack:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download IPA file
      run: |
        curl -L -o app.ipa "https://github.com/Doann7457/tai-ipa/releases/download/jp.co.capcom.RE4US-6462360082-863325402/jp.co.capcom.RE4US-1.0.2-6462360082-863325402.ipa"

    - name: Extract IPA
      run: |
        mkdir -p extracted_ipa
        unzip app.ipa -d extracted_ipa/

    - name: Extract Original Compilation Code Paths
      run: |
        echo "Locating primary executable binary..."
        # macOS 'find' syntax optimized to target the App bundle layout safely
        BINARY_PATH=$(find extracted_ipa -type f -path "*/Resident Evil 4.app/Resident Evil 4" -print -quit)
        
        if [ -n "$BINARY_PATH" ]; then
            echo "Found binary executable file at: $BINARY_PATH"
            mkdir -p Source_Code_Paths
            
            echo "Extracting internal compilation paths..."
            # Expanded regex to capture c, cpp, h, hpp, swift, m, mm, py, lua, go, cs, and txt extensions
            strings "$BINARY_PATH" | grep -E "\.(cpp|hpp|c|h|swift|m|mm|py|lua|go|cs|txt)\b" | sort -u > Source_Code_Paths/original_developer_source_paths.txt || true
            
            # Extract structural asset reference maps/json/system strings
            strings "$BINARY_PATH" | grep -E "(^|[a-zA-Z]:\\|/)([^/\\\0]+[/\\\\])+[^/\\\0]+" | sort -u > Source_Code_Paths/all_embedded_system_paths.txt || true
            
            # Package the structural maps up
            zip -r re4_source_code_paths.zip Source_Code_Paths/
            echo "Success: Code execution path map generated into re4_source_code_paths.zip"
        else
            echo "CRITICAL ERROR: 'Resident Evil 4' binary file could not be found!"
            exit 1
        fi

    # Note: Ensure your unpacking script outputs to 'Extracted_Output' if you want this step to find files.
    - name: Save Extracted Pak Assets Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Extracted-RE4-Assets
        path: Extracted_Output/
        retention-days: 3

    - name: Save Original Source Paths Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Resident-Evil-4-Original-Source-Paths
        path: re4_source_code_paths.zip
        retention-days: 3
